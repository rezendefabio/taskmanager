server {
    listen 80;
    resolver 127.0.0.11 valid=10s;

    set $backend http://backend:8080;

    rewrite ^(/auth/.*)$ $1 break;
    rewrite ^(/projects/.*)$ $1 break;

    location /auth {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /projects {
        rewrite ^(.*)/$ $1 break;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /swagger-ui {
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    location /v3 {
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    location /h2-console {
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
